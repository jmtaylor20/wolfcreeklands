<title>Thank You | Wolf Creek Farms</title>

<meta name="description" content="Thank you for requesting a free estimate from Wolf Creek Farms.">

<style>
:root{
--hunter:#203b2d;
--hunter2:#2f5a3f;
--charcoal:#101413;
--white:#ffffff;
--soft:#d7ded2;
--accent:#91aa6d;
--line:rgba(255,255,255,.14);
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:Arial,Helvetica,sans-serif;
background:
linear-gradient(90deg,rgba(16,20,19,.94),rgba(16,20,19,.74)),
url("assets/equipment/wolf-creek-hero-excavator.jpg");
background-size:cover;
background-position:center;
color:var(--white);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
line-height:1.6;
padding:30px;
}

.card{
width:min(760px,100%);
background:rgba(18,24,21,.94);
border:1px solid var(--line);
border-radius:30px;
padding:44px;
text-align:center;
box-shadow:0 22px 60px rgba(0,0,0,.34);
}

.logo{
max-width:320px;
margin:0 auto 26px;
filter:drop-shadow(0 4px 12px rgba(0,0,0,.55));
}

.kicker{
color:var(--accent);
font-size:14px;
font-weight:900;
letter-spacing:2px;
text-transform:uppercase;
margin-bottom:14px;
}

h1{
font-size:clamp(42px,6vw,72px);
line-height:.92;
text-transform:uppercase;
letter-spacing:-2px;
margin-bottom:18px;
}

p{
font-size:20px;
color:var(--soft);
max-width:620px;
margin:0 auto 26px;
}

.btn-wrap{
display:flex;
justify-content:center;
gap:14px;
flex-wrap:wrap;
margin-top:28px;
}

.btn{
display:inline-flex;
align-items:center;
justify-content:center;
padding:14px 24px;
border-radius:999px;
font-weight:900;
text-decoration:none;
transition:.25s;
}

.btn:hover{
transform:translateY(-2px);
}

.btn-primary{
background:var(--hunter2);
color:white;
}

.btn-secondary{
background:white;
color:var(--charcoal);
}

.phone{
margin-top:24px;
font-weight:900;
color:white;
}

.phone small{
display:block;
font-size:13px;
color:var(--soft);
font-weight:700;
}

@media(max-width:700px){
.card{
padding:30px 22px;
}

.logo{
max-width:260px;
}
}
</style>
<link rel="stylesheet" href="css/agency.css">
<script src="js/agency.js" defer></script>
</head>

<body>

<div class="card">

<img src="assets/logo/wolf-creek-logo-white.png" alt="Wolf Creek Farms" class="logo">

<div class="kicker">Estimate Request Received</div>

<h1>Thank You.</h1>

<p>
Your request has been submitted. Russ will follow up as soon as possible to talk through your project, location, and next steps.
</p>

<div class="btn-wrap">
<a href="index.html" class="btn btn-secondary">Back to Home</a>
<a href="services.html" class="btn btn-primary">View Services</a>
<a href="tel:3342073331" class="btn btn-primary">Call Now</a>
</div>

<div class="phone">
334-207-3331
<small>Call or Text for Estimates</small>
</div>

</div>

</body>
</html>
